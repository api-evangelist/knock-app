naftiko: 1.0.0-alpha2
info:
  label: Knock Audiences API — Audiences
  description: 'Knock Audiences API — Audiences. 3 operations. Lead operation: addaudiencemembers. Self-contained Naftiko capability covering one Knock business surface.'
  tags:
  - Knock
  - Audiences
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    KNOCK_API_KEY: KNOCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: audiences
    baseUri: https://api.knock.app
    description: Knock Knock Audiences API business capability. Self-contained, no shared references.
    resources:
    - name: v1-audiences-key-members
      path: /v1/audiences/{key}/members
      operations:
      - name: removeaudiencemembers
        method: DELETE
        description: Remove members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
      - name: listaudiencemembers
        method: GET
        description: List members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
      - name: addaudiencemembers
        method: POST
        description: Add members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.KNOCK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: audiences-rest
    port: 8080
    description: REST adapter for Knock Knock Audiences API.
    resources:
    - path: /v1/v1/audiences/{key}/members
      name: v1-audiences-key-members
      description: REST surface for v1-audiences-key-members.
      operations:
      - method: DELETE
        name: removeaudiencemembers
        description: Remove members
        call: audiences.removeaudiencemembers
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listaudiencemembers
        description: List members
        call: audiences.listaudiencemembers
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addaudiencemembers
        description: Add members
        call: audiences.addaudiencemembers
        with:
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: audiences-mcp
    port: 9090
    transport: http
    description: MCP adapter for Knock Knock Audiences API. One tool per consumed operation.
    tools:
    - name: knock-removeaudiencemembers
      description: Remove members
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: audiences.removeaudiencemembers
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: knock-listaudiencemembers
      description: List members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: audiences.listaudiencemembers
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: knock-addaudiencemembers
      description: Add members
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: audiences.addaudiencemembers
      with:
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
