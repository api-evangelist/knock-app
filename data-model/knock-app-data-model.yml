description: >-
  Entity-relationship graph for Knock, derived from the OpenAPI component
  schemas in this repo (id-reference and $ref fields on the core objects) and
  corroborated against the Knock object reference. Knock's recipient model is
  polymorphic: a Recipient is either a User or an Object (collection + id), and
  Messages/Schedules/Subscriptions/Activities all point at a Recipient. Field
  names in relationships[].via are the actual property names on the source
  schema.
id_conventions:
  User.id: developer-supplied identifier (your system's user id), not prefixed by Knock
  Object: 'addressed as { collection, id } — e.g. { collection: projects, id: project_123 }'
  Tenant.id: developer-supplied identifier
  note: >-
    Unlike prefixed-id providers, Knock uses caller-supplied identifiers for
    Users/Objects/Tenants; system objects (messages, bulk operations) carry
    Knock-generated ids.
