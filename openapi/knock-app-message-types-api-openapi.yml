      example:
        key: markdown_field
        label: Markdown Field
        settings:
          default: '# Heading


            This is **bold** and this is *italic*.'
          description: A description of the markdown field
          placeholder: A placeholder for the markdown field
          required: true
        type: markdown
      properties:
        key:
          description: The unique key of the field.
          example: key
          type: string
          x-struct: null
          x-validate: null
        label:
          description: The label of the field.
          example: Label
          nullable: true
          type: string
          x-struct: null
          x-validate: null
        settings:
          description: Settings for the markdown field.
          properties:
            default:
              description: The default value of the markdown field.
              example: '# Heading


                This is **bold** and this is *italic*.'
              type: string
              x-struct: null
              x-validate: null
            description:
              example: A description of the field, used in the UI as a hint text.
              nullable: true
              type: string
              x-struct: null
              x-validate: null
            placeholder:
              example: A placeholder for the field.
              nullable: true
              type: string
              x-struct: null
              x-validate: null
            required:
              description: Whether the field is required.
              example: true
              type: boolean
              x-struct: null
              x-validate: null
          type: object
          x-struct: null
          x-validate: null
        type:
          description: The type of the field.
          enum:
          - markdown
          example: markdown
          type: string
          x-struct: null
          x-validate: null
      required:
      - type
      - key
      - label
      title: MessageTypeMarkdownField
      type: object
      x-struct: Elixir.ControlWeb.V1.Specs.MessageTypes.MarkdownField
      x-validate: null
