openapi: 3.0.3
info:
  title: Knock Audiences Accounts Message types API
  version: '1.0'
  description: Manage static Audiences and their members. Audiences power lifecycle messaging — when a user joins an audience, configured workflows fire automatically.
  contact:
    name: Knock
    url: https://knock.app
  license:
    name: Proprietary
servers:
- url: https://api.knock.app
  variables: {}
security:
- BearerAuth: []
tags:
- description: A message type allows you to specify an in-app schema that defines the fields available for your in-app notifications.
  name: Message types
paths:
  /v1/message_types/{message_type_key}/validate:
    put:
      callbacks: {}
      description: 'Validates a message type payload without persisting it.


        Note: this endpoint only operates on message types in the `development` environment.

        '
      operationId: validateMessageType
      parameters:
      - description: The key of the message type to validate.
        in: path
        name: message_type_key
        required: true
        schema:
          example: email
          type: string
          x-struct: null
          x-validate: null
      - description: The environment slug.
        in: query
        name: environment
        required: true
        schema:
          example: development
          type: string
          x-struct: null
          x-validate: null
      - description: The slug of a branch to use. This option can only be used when `environment` is `"development"`.
        in: query
        name: branch
        required: false
        schema:
          example: feature-branch
          type: string
          x-struct: null
          x-validate: null
      requestBody:
        content:
          application/json:
            schema:
              description: Wraps the MessageTypeRequest request under the message_type key.
              example:
                message_type:
                  description: This is a message type
                  name: My Message Type
                  preview: <div>Hello, world!</div>
                  variants:
                  - fields:
                    - key: text_field
                      label: My text field
                      settings:
                        description: A description of the text field
                        max_length: 100
                        min_length: 10
                        required: true
                      type: text
                    key: default
                    name: Default
              properties:
                message_type:
                  $ref: '#/components/schemas/MessageTypeRequest'
              required:
              - message_type
              title: WrappedMessageTypeRequestRequest
              type: object
              x-struct: null
              x-validate: null
        description: Params
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Wraps the MessageType response under the `message_type` key.
                example:
                  message_type:
                    archived_at: null
                    created_at: '2021-01-01T00:00:00Z'
                    deleted_at: null
                    description: Email message type
                    environment: development
                    icon_name: email
                    key: email
                    name: Email
                    owner: user
                    preview: <div>Hello, world!</div>
                    semver: 1.0.0
                    sha: '1234567890'
                    updated_at: '2021-01-01T00:00:00Z'
                    valid: true
                    variants:
                    - fields:
                      - key: text_field
                        label: My text field
                        settings:
                          description: A description of the text field
                          max_length: 100
                          min_length: 10
                          required: true
                        type: text
                      key: default
                      name: Default
                properties:
                  message_type:
                    $ref: '#/components/schemas/MessageType'
                required:
                - message_type
                title: WrappedMessageTypeResponse
                type: object
                x-struct: null
                x-validate: null
          description: OK
      summary: Validate message type
      tags:
      - Message types
  /v1/message_types/{message_type_key}:
    get:
      callbacks: {}
      description: Retrieve a message type by its key, in a given environment.
      operationId: getMessageType
      parameters:
      - description: The key of the message type to retrieve.
        in: path
        name: message_type_key
        required: true
        schema:
          example: email
          type: string
          x-struct: null
          x-validate: null
      - description: The environment slug.
        in: query
        name: environment
        required: true
        schema:
          example: development
          type: string
          x-struct: null
          x-validate: null
      - description: The slug of a branch to use. This option can only be used when `environment` is `"development"`.
        in: query
        name: branch
        required: false
        schema:
          example: feature-branch
          type: string
          x-struct: null
          x-validate: null
      - description: Whether to annotate the resource. Only used in the Knock CLI.
        in: query
        name: annotate
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: Whether to hide uncommitted changes. When true, only committed changes will be returned. When false, both committed and uncommitted changes will be returned.
        in: query
        name: hide_uncommitted_changes
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageType'
          description: OK
      summary: Get message type
      tags:
      - Message types
    put:
      callbacks: {}
      description: 'Updates a message type, or creates a new one if it does not yet exist.


        Note: this endpoint only operates in the `development` environment.

        '
      operationId: upsertMessageType
      parameters:
      - description: The key of the message type to upsert.
        in: path
        name: message_type_key
        required: true
        schema:
          example: email
          type: string
          x-struct: null
          x-validate: null
      - description: The environment slug.
        in: query
        name: environment
        required: true
        schema:
          example: development
          type: string
          x-struct: null
          x-validate: null
      - description: The slug of a branch to use. This option can only be used when `environment` is `"development"`.
        in: query
        name: branch
        required: false
        schema:
          example: feature-branch
          type: string
          x-struct: null
          x-validate: null
      - description: Whether to annotate the resource. Only used in the Knock CLI.
        in: query
        name: annotate
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: When set to true, forces the upsert to override existing content regardless of environment restrictions. This bypasses the development-only environment check and origin environment checks.
        in: query
        name: force
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: Whether to commit the resource at the same time as modifying it.
        in: query
        name: commit
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: The message to commit the resource with, only used if `commit` is `true`.
        in: query
        name: commit_message
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      requestBody:
        content:
          application/json:
            schema:
              description: Wraps the MessageTypeRequest request under the message_type key.
              example:
                message_type:
                  description: This is a message type
                  name: My Message Type
                  preview: <div>Hello, world!</div>
                  variants:
                  - fields:
                    - key: text_field
                      label: My text field
                      settings:
                        description: A description of the text field
                        max_length: 100
                        min_length: 10
                        required: true
                      type: text
                    key: default
                    name: Default
              properties:
                message_type:
                  $ref: '#/components/schemas/MessageTypeRequest'
              required:
              - message_type
              title: WrappedMessageTypeRequestRequest
              type: object
              x-struct: null
              x-validate: null
        description: Params
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Wraps the MessageType response under the `message_type` key.
                example:
                  message_type:
                    archived_at: null
                    created_at: '2021-01-01T00:00:00Z'
                    deleted_at: null
                    description: Email message type
                    environment: development
                    icon_name: email
                    key: email
                    name: Email
                    owner: user
                    preview: <div>Hello, world!</div>
                    semver: 1.0.0
                    sha: '1234567890'
                    updated_at: '2021-01-01T00:00:00Z'
                    valid: true
                    variants:
                    - fields:
                      - key: text_field
                        label: My text field
                        settings:
                          description: A description of the text field
                          max_length: 100
                          min_length: 10
                          required: true
                        type: text
                      key: default
                      name: Default
                properties:
                  message_type:
                    $ref: '#/components/schemas/MessageType'
                required:
                - message_type
                title: WrappedMessageTypeResponse
                type: object
                x-struct: null
                x-validate: null
          description: OK
      summary: Upsert message type
      tags:
      - Message types
  /v1/message_types:
    get:
      callbacks: {}
      description: Returns a paginated list of message types available in a given environment.
      operationId: listMessageTypes
      parameters:
      - description: The environment slug.
        in: query
        name: environment
        required: true
        schema:
          example: development
          type: string
          x-struct: null
          x-validate: null
      - description: The slug of a branch to use. This option can only be used when `environment` is `"development"`.
        in: query
        name: branch
        required: false
        schema:
          example: feature-branch
          type: string
          x-struct: null
          x-validate: null
      - description: Whether to annotate the resource. Only used in the Knock CLI.
        in: query
        name: annotate
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: Whether to hide uncommitted changes. When true, only committed changes will be returned. When false, both committed and uncommitted changes will be returned.
        in: query
        name: hide_uncommitted_changes
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries after.
        in: query
        name: after
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries before.
        in: query
        name: before
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The number of entries to fetch per-page.
        in: query
        name: limit
        required: false
        schema:
          type: integer
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A paginated list of MessageType. Contains a list of entries and page information.
                example:
                  entries:
                  - archived_at: null
                    created_at: '2021-01-01T00:00:00Z'
                    deleted_at: null
                    description: Email message type
                    environment: development
                    icon_name: email
                    key: email
                    name: Email
                    owner: user
                    preview: <div>Hello, world!</div>
                    semver: 1.0.0
                    sha: '1234567890'
                    updated_at: '2021-01-01T00:00:00Z'
                    valid: true
                    variants:
                    - fields:
                      - key: text_field
                        label: My text field
                        settings:
                          description: A description of the text field
                          max_length: 100
                          min_length: 10
                          required: true
                        type: text
                      key: default
                      name: Default
                  page_info:
                    after: null
                    before: null
                    page_size: 25
                properties:
                  entries:
                    description: A list of entries.
                    items:
                      $ref: '#/components/schemas/MessageType'
                    nullable: false
                    type: array
                    x-struct: null
                    x-validate: null
                  page_info:
                    $ref: '#/components/schemas/PageInfo'
                required:
                - entries
                - page_info
                title: PaginatedMessageTypeResponse
                type: object
                x-struct: null
                x-validate: null
          description: OK
      summary: List message types
      tags:
      - Message types
components:
