          type: string
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Message'
                example:
                  __typename: Message
                  actors:
                  - user_123
                  archived_at: null
                  channel_id: 123e4567-e89b-12d3-a456-426614174000
                  clicked_at: null
                  data:
                    foo: bar
                  engagement_statuses: []
                  id: 1jNaXzB2RZX3LY8wVQnfCKyPnv7
                  inserted_at: '2021-01-01T00:00:00Z'
                  interacted_at: null
                  link_clicked_at: null
                  metadata:
                    external_id: 123e4567-e89b-12d3-a456-426614174000
                  read_at: null
                  recipient: user_123
                  scheduled_at: null
                  seen_at: null
                  source:
                    __typename: NotificationSource
                    categories:
                    - collaboration
