            - $ref: '#/components/schemas/MessageTypeImageField'
            - $ref: '#/components/schemas/MessageTypeJsonField'
            - $ref: '#/components/schemas/MessageTypeMarkdownField'
            - $ref: '#/components/schemas/MessageTypeMultiSelectField'
