openapi: 3.0.3
info:
  title: Knock Tenants API
  version: '1.0'
  description: Manage Tenants — the top-level accounts or workspaces in your product. Tenants power tenant-scoped branding,
    preferences, and message-targeting.
  contact:
    name: Knock
    url: https://knock.app
  license:
    name: Proprietary
servers:
- url: https://api.knock.app
  variables: {}
security:
- BearerAuth: []
paths:
  /v1/tenants/{id}:
    delete:
      callbacks: {}
      description: Delete a tenant and all associated data. This operation cannot be undone.
      operationId: deleteTenant
      parameters:
      - description: The unique identifier for the tenant.
        in: path
        name: id
        required: true
        schema:
          type: string
          x-struct: null
          x-validate: null
      responses:
        '204':
          description: No Content
      summary: Delete a tenant
      tags:
      - Tenants
      x-ratelimit-tier: 2
    get:
      callbacks: {}
      description: Get a tenant by ID.
      operationId: getTenant
      parameters:
      - description: The unique identifier for the tenant.
        in: path
        name: id
        required: true
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: When true, merges environment-level default preferences into the tenant's `settings.preference_set` field
          before returning the response. Defaults to false.
        in: query
        name: resolve_full_preference_settings
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
          description: OK
      summary: Get a tenant
      tags:
      - Tenants
      x-ratelimit-tier: 4
    put:
      callbacks: {}
      description: Sets a tenant within an environment, performing an upsert operation. Any existing properties will be merged
        with the incoming properties.
      operationId: setTenant
      parameters:
      - description: The unique identifier for the tenant.
        in: path
        name: id
        required: true
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: When true, merges environment-level default preferences into the tenant's `settings.preference_set` field
          before returning the response. Defaults to false.
        in: query
        name: resolve_full_preference_settings
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      requestBody:
        content:
          application/json:
            example:
              name: Jurassic Park
              settings:
                branding:
                  icon_url: https://example.com/trex_silhouette_icon.png
                  logo_url: https://example.com/amber_fossil_logo.png
                  primary_color: '#DF1A22'
                  primary_color_contrast: '#FFDE00'
            schema:
              $ref: '#/components/schemas/SetTenantRequest'
        description: Tenant
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetTenantResponse'
          description: OK
      summary: Set a tenant
      tags:
      - Tenants
      x-ratelimit-tier: 3
  /v1/tenants:
    get:
      callbacks: {}
      description: List tenants for the current environment.
      operationId: listTenants
      parameters:
      - description: Filter tenants by ID.
        in: query
        name: tenant_id
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: Filter tenants by name.
        in: query
        name: name
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries after.
        in: query
        name: after
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries before.
        in: query
        name: before
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The number of items per page (defaults to 50).
        in: query
        name: page_size
        required: false
        schema:
          type: integer
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTenantsResponse'
          description: OK
      summary: List tenants
      tags:
      - Tenants
      x-ratelimit-tier: 4
  /v1/tenants/bulk/delete:
    post:
      callbacks: {}
      description: Delete up to 1,000 tenants at a time in a single operation. This operation cannot be undone.
      operationId: bulkDeleteTenants
      parameters:
      - description: The IDs of the tenants to delete.
        in: query
        name: tenant_ids[]
        required: true
        schema:
          items:
            type: string
            x-struct: null
            x-validate: null
          type: array
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperation'
          description: OK
      summary: Bulk delete tenants
      tags:
      - Tenants
      - Bulk operations
      x-ratelimit-tier: 1
  /v1/tenants/bulk/set:
    post:
      callbacks: {}
      description: Set or update up to 1,000 tenants in a single operation.
      operationId: bulkSetTenants
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              tenants:
              - id: tenant_1
                name: Acme Corp, Inc.
            schema:
              $ref: '#/components/schemas/BulkSetTenantsRequest'
        description: Params
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperation'
          description: OK
      summary: Bulk set tenants
      tags:
      - Tenants
      - Bulk operations
      x-ratelimit-tier: 1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Knock API key as a Bearer token. Use a public key (pk_...) for client-side requests or a secret key (sk_...)
        for server-side.
  schemas:
    ListTenantsResponse:
      description: A response containing a list of tenants.
      example:
        entries:
        - __typename: Tenant
          id: tenant_jp123
          name: Jurassic Park
          settings:
            branding:
              icon_url: https://example.com/trex_silhouette_icon.png
              logo_url: https://example.com/amber_fossil_logo.png
              primary_color: '#DF1A22'
              primary_color_contrast: '#FFDE00'
            preference_set:
              categories:
                safety:
                  channel_types:
                    email: true
                    push: true
              channel_types:
                email: true
                in_app_feed: true
                push: true
              id: default
              workflows:
                park_alert:
                  channel_types:
                    email: true
                    push: true
        page_info:
          __typename: PageInfo
          after: null
          before: null
          page_size: 25
      properties:
        entries:
          description: A list of tenants.
          items:
            $ref: '#/components/schemas/Tenant'
          type: array
          x-struct: null
          x-validate: null
        page_info:
          $ref: '#/components/schemas/PageInfo'
      required:
      - entries
      - page_info
      title: ListTenantsResponse
      type: object
      x-struct: Elixir.SwitchboardWeb.V1.Specs.ListTenantsResponse
      x-validate: null
    PageInfo:
      description: Pagination information for a list of resources.
      example:
        __typename: PageInfo
        after: null
        before: null
        page_size: 25
      properties:
        __typename:
          description: The typename of the schema.
          example: PageInfo
          type: string
          x-struct: null
          x-validate: null
        after:
          description: The cursor to fetch entries after.
          nullable: true
          type: string
          x-struct: null
          x-validate: null
        before:
          description: The cursor to fetch entries before.
          nullable: true
          type: string
          x-struct: null
          x-validate: null
        page_size:
          description: The number of items per page (defaults to 50).
          type: integer
          x-struct: null
          x-validate: null
      required:
      - __typename
      - page_size
      title: PageInfo
      type: object
      x-struct: Elixir.SwitchboardWeb.V1.Specs.PageInfo
      x-validate: null
    Tenant:
      additionalProperties: true
      description: A tenant entity.
      example:
        __typename: Tenant
        id: tenant_jp123
        name: Jurassic Park
        settings:
          branding:
            icon_url: https://example.com/trex_silhouette_icon.png
            logo_url: https://example.com/amber_fossil_logo.png
            primary_color: '#DF1A22'
            primary_color_contrast: '#FFDE00'
          preference_set:
            categories:
              safety:
                channel_types:
                  email: true
                  push: true
            channel_types:
              email: true
              in_app_feed: true
              push: true
            id: default
            workflows:
              park_alert:
                channel_types:
                  email: true
                  push: true
      properties:
        __typename:
          description: The typename of the schema.
          example: Tenant
          type: string
          x-struct: null
          x-validate: null
        id:
          description: The unique identifier for the tenant.
          nullable: false
          type: string
          x-struct: null
          x-validate: null
        name:
          description: An optional name for the tenant.
          nullable: true
          type: string
          x-struct: null
          x-validate: null
        settings:
          description: The settings for the tenant. Includes branding and preference set.
          nullable: true
          properties:
            branding:
              description: The branding for the tenant.
              nullable: true
              properties:
                icon_url:
                  description: The icon URL for the tenant. Must point to a valid image with an image MIME type.
                  example: https://example.com/trex_silhouette_icon.png
                  format: uri
                  nullable: true
                  type: string
                  x-struct: null
                  x-validate: null
                logo_url:
                  description: The logo URL for the tenant. Must point to a valid image with an image MIME type.
                  example: https://example.com/amber_fossil_logo.png
                  format: uri
                  nullable: true
                  type: string
                  x-struct: null
                  x-validate: null
                primary_color:
                  description: The primary color for the tenant, provided as a hex value.
                  example: '#DF1A22'
                  nullable: true
                  type: string
                  x-struct: null
                  x-validate: null
                primary_color_contrast:
                  description: The primary color contrast for the tenant, provided as a hex value.
                  example: '#FFDE00'
                  nullable: true
                  type: string
                  x-struct: null
                  x-validate: null
              type: object
              x-struct: null
              x-validate: null
            preference_set:
              anyOf:
              - $ref: '#/components/schemas/PreferenceSet'
              - nullable: true
                x-struct: null
                x-validate: null
              description: The preference set for the tenant. Used to override the default preference set.
              x-struct: null
              x-validate: null
          type: object
          x-struct: null
          x-validate: null
      required:
      - __typename
      - id
      title: Tenant
      type: object
      x-struct: Elixir.SwitchboardWeb.V1.Specs.Tenant
      x-validate: null
    PreferenceSet:
      description: A preference set represents a specific set of notification preferences for a recipient. A recipient can
        have multiple preference sets.
      example:
        categories:
          marketing: false
          transactional:
            channel_types:
              email: false
        channel_types:
          email: true
          push: false
          sms:
            conditions:
            - argument: US
              operator: equal_to
              variable: recipient.country_code
        commercial_subscribed: true
        id: default
        workflows: null
      properties:
        categories:
          anyOf:
          - additionalProperties:
              $ref: '#/components/schemas/PreferenceSetWorkflowCategorySetting'
            description: An object where the key is the category and the values are the preference settings for that category.
            example:
              marketing:
                channel_types:
                  email: false
            title: PreferenceSetCategories
            type: object
            x-struct: null
            x-validate: null
          - nullable: true
            x-struct: null
            x-validate: null
          description: An object where the key is the category and the values are the preference settings for that category.
          x-struct: null
          x-validate: null
        channel_types:
          anyOf:
          - $ref: '#/components/schemas/PreferenceSetChannelTypes'
