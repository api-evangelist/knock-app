                broadcast:
                  $ref: '#/components/schemas/BroadcastRequest'
              required:
              - broadcast
              title: WrappedBroadcastRequestRequest
              type: object
              x-struct: null
              x-validate: null
        description: Params
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Wraps the Broadcast response under the `broadcast` key.
                example:
                  broadcast:
                    categories:
                    - marketing
                    - promotions
                    created_at: '2022-12-16T19:07:50.027113Z'
                    description: Holiday promotion broadcast for December
                    environment: development
                    key: december-promotion
                    name: December Promotion
                    scheduled_at: null
                    sent_at: null
                    settings:
                      is_commercial: true
                      override_preferences: false
                    sha: f7e9d3b2a1c8e6m4k5j7h9g0i2l3n4p6q8r0t1u3v5w7x9y
                    status: draft
                    steps:
                    - channel_key: in-app-feed
                      description: Main in-app feed
                      name: In-app step
                      ref: in_app_feed_1
                      template:
                        action_url: '{{ vars.app_url }}'
                        markdown_body: Hello **{{ recipient.name }}**
                      type: channel
                    target_audience_key: premium-users
                    updated_at: '2023-02-08T22:15:19.846681Z'
                    valid: true
                properties:
                  broadcast:
                    $ref: '#/components/schemas/Broadcast'
                required:
                - broadcast
                title: WrappedBroadcastResponse
                type: object
                x-struct: null
                x-validate: null
          description: OK
      summary: Validate a broadcast
      tags:
      - Broadcasts
  /v1/broadcasts:
    get:
      callbacks: {}
      description: Returns a paginated list of broadcasts available in a given environment. The broadcasts are returned ordered by creation time (newest first).
      operationId: listBroadcasts
      parameters:
      - description: The environment slug.
        in: query
        name: environment
        required: true
        schema:
          example: development
          type: string
          x-struct: null
          x-validate: null
      - description: The slug of a branch to use. This option can only be used when `environment` is `"development"`.
        in: query
        name: branch
        required: false
        schema:
          example: feature-branch
          type: string
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries after.
        in: query
        name: after
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The cursor to fetch entries before.
        in: query
        name: before
        required: false
        schema:
          type: string
          x-struct: null
          x-validate: null
      - description: The number of entries to fetch per-page.
        in: query
        name: limit
        required: false
        schema:
          type: integer
          x-struct: null
          x-validate: null
      - description: Whether to annotate the resource. Only used in the Knock CLI.
        in: query
        name: annotate
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      - description: Whether to hide uncommitted changes. When true, only committed changes will be returned. When false, both committed and uncommitted changes will be returned.
        in: query
        name: hide_uncommitted_changes
        required: false
        schema:
          type: boolean
          x-struct: null
          x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                description: A paginated list of Broadcast. Contains a list of entries and page information.
                example:
                  entries:
                  - categories:
                    - marketing
                    - promotions
                    created_at: '2022-12-16T19:07:50.027113Z'
                    description: Holiday promotion broadcast for December
                    environment: development
                    key: december-promotion
                    name: December Promotion
                    scheduled_at: null
                    sent_at: null
                    settings:
                      is_commercial: true
                      override_preferences: false
                    sha: f7e9d3b2a1c8e6m4k5j7h9g0i2l3n4p6q8r0t1u3v5w7x9y
                    status: draft
                    steps:
                    - channel_key: in-app-feed
                      description: Main in-app feed
                      name: In-app step
                      ref: in_app_feed_1
                      template:
                        action_url: '{{ vars.app_url }}'
                        markdown_body: Hello **{{ recipient.name }}**
                      type: channel
                    target_audience_key: premium-users
                    updated_at: '2023-02-08T22:15:19.846681Z'
                    valid: true
                  page_info:
                    after: null
                    before: null
                    page_size: 25
                properties:
                  entries:
                    description: A list of entries.
                    items:
                      $ref: '#/components/schemas/Broadcast'
                    nullable: false
                    type: array
                    x-struct: null
                    x-validate: null
                  page_info:
                    $ref: '#/components/schemas/PageInfo'
                required:
                - entries
                - page_info
                title: PaginatedBroadcastResponse
                type: object
                x-struct: null
                x-validate: null
          description: OK
      summary: List broadcasts
      tags:
      - Broadcasts
