          type: string
          x-struct: null
          x-validate: null
      requestBody:
        content:
          application/json:
            schema:
              description: Wraps the GuideRequest request under the guide key.
              example:
                guide:
                  activation_url_patterns:
                  - directive: allow
                    pathname: /dashboard/*
                  channel_key: in-app-guide
