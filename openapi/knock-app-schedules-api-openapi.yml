          - push_token_xxx
      title: InlineChannelDataRequest
      type: object
      x-struct: Elixir.SwitchboardWeb.V1.Specs.InlineChannelDataRequest
      x-validate: null
    ListSchedulesResponse:
      description: A response containing a list of schedules.
      example:
        entries:
