- type: Features
  data:
  - Cross-channel notification workflows — email, SMS, push, in-app, in-app guides,
    chat (Slack/Discord/Teams/WhatsApp), and outbound webhooks from one trigger
  - Workflow function steps — batch, delay, branch, experiment, throttle, fetch (HTTP),
    AI agent, trigger-workflow, update-user / update-tenant / update-object / update-data
    / update-audience
  - Drag-and-drop workflow builder used collaboratively by engineering, product, and
    growth
  - Broadcasts — one-time messages to audience-targeted groups from the Knock dashboard
  - Guides — in-app lifecycle messaging using your own components and design system
  - Recipients model — Users, non-user Objects, and Tenants with channel data and
    properties
  - Preferences — per-channel, per-workflow, per-category preference sets enforced
    automatically on every run and broadcast
  - Audiences — static and dynamic user segments that automatically drive lifecycle
    workflow triggers
  - Schedules — one-off and recurring (timezone-aware) workflow firing
  - Subscriptions — many-to-many fan-out from Objects to recipient lists
  - Conditions — dynamic control flow on trigger data, recipient properties, and prior
    step status
  - Templates — drag-and-drop editor + Liquid; partials, branding, translations (i18n),
    email layouts
  - Real-time in-app feed API plus pre-built React, JavaScript, iOS, Android, Flutter,
    React Native, Expo, and Vue/Nuxt SDKs
  - Outbound webhook events for full message lifecycle and environment change tracking
  - Customer-facing webhook channel (let your customers configure their own webhook
    destinations)
  - Idempotent requests via Idempotency-Key
  - Cursor-based pagination
  - Tiered per-endpoint rate limits (1, 5, 60, 200, 1000 req/sec) scoped per environment
    or per signed user
  - Enhanced security mode with signed user tokens (JWT)
  - Environments + Branches + Commits — git-style resource workflow with promotion
    across dev/staging/prod
  - Knock CLI for local-first resource management against the Management API
  - Knock MCP server (remote) at mcp.knock.app/mcp — OAuth 2.1 + PKCE; tool groups
    for resources, commits, debug, data, and docs
  - Knock Agent Toolkit — AI SDK, OpenAI function-calling, Langchain, Mastra, and
    local MCP server bindings
  - AI agent function step inside workflows for prompt-driven enrichment and personalization
  - Knock skills — procedural knowledge packages for AI agents working with Knock
  - SlackKit and TeamsKit — drop-in OAuth + channel-data UX for connecting customer
    Slack/Teams workspaces
  - Data warehouse / Segment / Datadog observability streams
  - Source events — trigger workflows from CDPs (Segment, Rudderstack) or reverse-ETL
    (Hightouch, Census)
  - Multi-tenancy with per-tenant branding and locked preferences (Enterprise)
  - SAML 2.0 SSO, SCIM directory sync, HIPAA / BAA on Enterprise
  - Official SDKs in Node, Python, Ruby, Go, Elixir, Java, .NET, PHP, plus mobile
    (Swift, Kotlin, Flutter, React Native, Expo) and Management-API SDKs (Node, Python,
    Go)
