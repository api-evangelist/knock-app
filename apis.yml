- aid: knock-app:knock-webhooks
  name: Knock Outbound Webhooks
  tags:
  - Webhooks
  - Events
  - AsyncAPI
  humanURL: https://docs.knock.app/developer-tools/outbound-webhooks/overview
  properties:
  - url: https://docs.knock.app/developer-tools/outbound-webhooks/overview
    type: Documentation
  - url: https://docs.knock.app/developer-tools/outbound-webhooks/event-types
    type: Documentation
  - url: asyncapi/knock-webhooks-asyncapi.yml
    type: AsyncAPI
  description: Outbound webhooks fire message lifecycle (sent, delivered, seen, read,
    interacted, archived, link_clicked, bounced, undelivered) and environment-change
    (workflow / email_layout / translation / partial / source_event_action updates
    and commits) events as JSON POSTs to subscriber URLs configured in the Knock dashboard.
