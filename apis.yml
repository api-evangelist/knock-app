position: Consuming
description: Knock is notifications infrastructure as a service — a product and customer
  messaging platform you use to power transactional, lifecycle, broadcast, and in-product
  messaging across email, SMS, push, in-app, in-app guides, chat (Slack / Discord
  / Teams / WhatsApp), and outbound webhooks. Knock exposes two REST surfaces — a
  runtime API (api.knock.app) for triggering workflows and managing recipients/messages,
  and a Management API (control.knock.app) for resource CRUD — together with official
  SDKs in Node, Python, Ruby, Go, Elixir, Java, .NET, PHP and mobile (Swift, Kotlin,
  Flutter, React Native, Expo); a CLI; a remote MCP server; an agent toolkit for OpenAI
  / AI SDK / Langchain / Mastra; outbound webhooks; AI agent workflow steps; SlackKit
  and TeamsKit; and a git-style environment / branch / commit model for safe promotion
  of notification resources.
