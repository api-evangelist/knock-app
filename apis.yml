    type: OpenAPI
  - url: json-schema/knock-workflow-trigger-schema.json
    type: JSONSchema
  - url: examples/knock-trigger-workflow-example.json
    type: Examples
  - url: graphql/knock-app-graphql.md
    type: GraphQL
  description: Trigger and cancel notification workflows and inspect workflow recipient
    runs. Workflows are Knock's core programmable model — orchestrating channel steps
    (email, SMS, push, in-app, chat, webhook) and function steps (batch, delay, branch,
    throttle, fetch, AI agent, trigger-workflow) with conditions and preferences across
    recipients.
