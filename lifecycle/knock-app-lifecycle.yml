description: >-
  Knock's REST API is unversioned in the request URL. Instead of a numbered or
  date-pinned API version, Knock evolves notification resources through a
  git-style model — Environments (dev/staging/production), Branches, and Commits
  — that promote changes across environments safely. No X-Knock-Version request
  header or dated-version scheme was found in the docs. SDKs follow independent
  semver and publish migration guides for major bumps (e.g. the Go SDK v0.x to
  v1.0 upgrade). No RFC 8594 Sunset/Deprecation header policy is documented for
  the HTTP API.
