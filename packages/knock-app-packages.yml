method: searched
source: https://docs.knock.app/developer-tools/sdks
description: >-
  First-party Knock client libraries and tools, verified against the public
  package registries (npm registry.npmjs.org, PyPI, RubyGems, Packagist,
  pkg.go.dev) and the knocklabs GitHub organization. Registry HTTP status was
  recorded at fetch time. Knock ships two SDK families: the runtime/data-plane
  SDKs (trigger workflows, manage recipients/messages) and the Management API
  (mAPI) SDKs (resource CRUD). The knock-node / knock-python / knock-ruby
  packages publish under registry names @knocklabs/node, knockapi (PyPI), and
  knockapi (RubyGems) respectively.
